<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grafo D3.js</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
      }
      svg {
        border: 1px solid #ccc;
      }
      div {
        text-align: justify;
        font-size: x-large;
      }
      .node {
        stroke: #fff;
        stroke-width: 2px;
        cursor: pointer;
      }
      .link {
        stroke: #999;
        stroke-opacity: 0.6;
      }
      .container {
        display: flex;
        flex-direction: row;
        gap: 10px;
        margin-bottom: 20px;
      }
      .container-div {
        padding: 10px;
        height: 200px;
        width: 600px;
        border: 1px solid #ccc;
        border-radius: 5px;
        color: rgb(0, 17, 255);
      }
    </style>
  </head>
  <body>
    <h1>TENNIS TAVOLO 2.0</h1>
    <div class="container">
      <div class="container-div">INFORMAZIONE 1</div>
      <div class="container-div">INFORMAZIONE 2</div>
      <div class="container-div">INFORMAZIONE 3</div>
      <div class="container-div">INFORMAZIONE 4</div>
    </div>
    <svg width="800" height="600"></svg>

    <script>
      // Example data for the graph
      const data = {
        nodes: [
          { id: "A", group: 1 },
          { id: "B", group: 1 },
          { id: "C", group: 2 },
          { id: "D", group: 2 },
          //{id: "E", group: 3},
          //{id: "F", group: 1},
          //{id: "G", group: 2},
          //{id: "H", group: 2},
        ],
        links: [
          { source: "A", target: "B", value: 1 },
          { source: "A", target: "C", value: 2 },
          { source: "B", target: "D", value: 1 },
          { source: "C", target: "D", value: 3 },
          //{source: "A", target: "C", value: 2},
          //{source: "B", target: "E", value: 1},
          //{source: "C", target: "F", value: 3}
        ],
      };

      // Select the SVG element
      const svg = d3.select("svg");
      const width = +svg.attr("width");
      const height = +svg.attr("height");

      const color = d3.scaleOrdinal(d3.schemeCategory10);

      // Create simulation
      const simulation = d3
        .forceSimulation(data.nodes)
        .force(
          "link",
          d3.forceLink(data.links).id((d) => d.id)
        )
        .force("charge", d3.forceManyBody())
        .force("center", d3.forceCenter(width / 2, height / 2));

      // Draw links
      const link = svg
        .append("g")
        .attr("stroke", "#999")
        .attr("stroke-opacity", 0.6)
        .selectAll("line")
        .data(data.links)
        .join("line")
        .attr("stroke-width", (d) => Math.sqrt(d.value));

      // Draw nodes
      const node = svg
        .append("g")
        .attr("stroke", "#fff")
        .attr("stroke-width", 1.5)
        .selectAll("circle")
        .data(data.nodes)
        .join("circle")
        .attr("r", 10)
        .attr("fill", (d) => color(d.group))
        .call(
          d3
            .drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended)
        );

      node.append("title").text((d) => d.id);

      simulation.on("tick", () => {
        link
          .attr("x1", (d) => d.source.x)
          .attr("y1", (d) => d.source.y)
          .attr("x2", (d) => d.target.x)
          .attr("y2", (d) => d.target.y);

        node.attr("cx", (d) => d.x).attr("cy", (d) => d.y);
      });

      function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      }

      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }

      function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      }
    </script>
  </body>
</html>
