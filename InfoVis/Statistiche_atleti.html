<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grafo D3.js</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f6f7f8;
        padding: 20px;
      }
      svg {
        border: 1px solid #ccc;
        border-radius: 50px;
        background-color: #ffffff;
        box-shadow: 10px 10px 2px 1px rgb(0 0 255 / 0.1);
      }
      h1 {
        text-align: center;
        color: rgb(0, 17, 255);
        font-size: 70px;
      }
      h2 {
        color: rgb(0, 17, 255);
        margin-top: 150px;
      }
      div {
        text-align: justify;
        font-size: x-large;
      }
      .node {
        stroke: #fff;
        stroke-width: 2px;
        cursor: pointer;
      }
      .link {
        stroke: #999;
        stroke-opacity: 0.6;
      }
      .container {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        max-width: 100vw;
        justify-content: space-evenly;
        gap: 10px;
        margin-bottom: 20px;
      }
      .container-div {
        padding: 10px;
        margin-bottom: 30px;
        box-shadow: 10px 10px 2px 1px rgb(0 0 255 / 0.1);
        height: 280px;
        min-width: 30vw;
        margin-left: 100px;
        border: 1px solid #ccc;
        border-radius: 50px;
        background-color: #ffffff;
        text-align: center;
        color: rgb(0, 17, 255);
      }
    </style>
  </head>
  <body>
    <h1>TENNIS TAVOLO 2.0</h1>

    <h3 for="intervallo-temporale">Seleziona il periodo temporale</h3>
    <select name="intervallo-temporale" id="selettore periodo">
      <option value="">--Seleziona--</option>
      <option value="settimana">Settimana</option>
      <option value="mese">Mese</option>
      <option value="anno">Anno</option>
    </select>
    <br />
    <h2>STATISTICHE ATLETI</h2>
    <svg id="straight-line" width="99%" height="90vh"></svg>

    <script>
      // Example data for the graph
      const data = {
        nodes: [
          { id: "A", group: 1 },
          { id: "B", group: 1 },
          { id: "C", group: 2 },
          { id: "D", group: 2 },
          { id: "E", group: 3 },
          { id: "F", group: 1 },
          { id: "G", group: 2 },
          { id: "H", group: 2 },
        ],
        links: [
          { source: "A", target: "B", value: 1 },
          { source: "A", target: "C", value: 2 },
          { source: "B", target: "D", value: 1 },
          { source: "C", target: "D", value: 3 },
          { source: "A", target: "C", value: 2 },
          { source: "B", target: "E", value: 1 },
          { source: "C", target: "F", value: 3 },
        ],
      };

      // Select the SVG element
      const svg = d3.select("svg");
      var width = svg.attr("width");
      var height = svg.attr("height");

      width = parseInt(width);
      height = parseInt(height);
      width =
        document.getElementById("straight-line").width.baseVal.value *
        width *
        0.01;
      height =
        document.getElementById("straight-line").height.baseVal.value *
        height *
        0.01;
      console.log(width + " " + height);
      const color = d3.scaleOrdinal(d3.schemeCategory10);

      // Create simulation
      const simulation = d3
        .forceSimulation(data.nodes)
        .force(
          "link",
          d3.forceLink(data.links).id((d) => d.id)
        )
        .force("charge", d3.forceManyBody())
        .force("center", d3.forceCenter(width / 2, height / 2));

      // Draw links
      const link = svg
        .append("g")
        .attr("stroke", "#999")
        .attr("stroke-opacity", 0.6)
        .selectAll("line")
        .data(data.links)
        .join("line")
        .attr("stroke-width", (d) => Math.sqrt(d.value));

      // Draw nodes
      const node = svg
        .append("g")
        .attr("stroke", "#fff")
        .attr("stroke-width", 1.5)
        .selectAll("circle")
        .data(data.nodes)
        .join("circle")
        .attr("r", 10)
        .attr("fill", (d) => color(d.group))
        .call(
          d3
            .drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended)
        );

      node.append("title").text((d) => d.id);

      simulation.on("tick", () => {
        link
          .attr("x1", (d) => d.source.x)
          .attr("y1", (d) => d.source.y)
          .attr("x2", (d) => d.target.x)
          .attr("y2", (d) => d.target.y);

        node.attr("cx", (d) => d.x).attr("cy", (d) => d.y);
      });

      function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      }

      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }

      function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      }
    </script>
  </body>
</html>
